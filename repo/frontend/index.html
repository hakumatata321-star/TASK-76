<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'" />
    <title>FleetReserve Operations Suite</title>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <style>
        :root { --primary: #1a56db; --danger: #dc2626; --success: #16a34a; --warning: #d97706; --bg: #f9fafb; --surface: #ffffff; --text: #111827; --border: #d1d5db; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
        .app-shell { display: flex; flex-direction: column; min-height: 100vh; }
        .nav { background: var(--primary); color: white; padding: 0.75rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .nav a { color: white; text-decoration: none; margin: 0 0.5rem; }
        .main { flex: 1; padding: 1.5rem; max-width: 1200px; margin: 0 auto; width: 100%; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1.5rem; margin-bottom: 1rem; }
        .btn { padding: 0.5rem 1rem; border-radius: 0.375rem; border: none; cursor: pointer; font-size: 0.875rem; font-weight: 500; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.25rem; font-weight: 500; font-size: 0.875rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 0.375rem; }
        .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
        .badge-available { background: #dcfce7; color: #166534; }
        .badge-reserved { background: #dbeafe; color: #1e40af; }
        .badge-on-rent { background: #fef3c7; color: #92400e; }
        .badge-in-repair { background: #fee2e2; color: #991b1b; }
        .badge-decommissioned { background: #f3f4f6; color: #6b7280; }
        .calendar-grid { display: grid; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 0.375rem; overflow: hidden; }
        .calendar-slot { background: var(--surface); padding: 0.25rem; min-height: 2rem; font-size: 0.75rem; }
        .calendar-slot.occupied { background: #dbeafe; }
        .conflict-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 0.5rem; padding: 1rem; margin: 1rem 0; }
        .alternative-box { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 0.5rem; padding: 1rem; margin: 1rem 0; }
        .ticket-display { text-align: center; padding: 2rem; }
        .ticket-number { font-size: 2rem; font-weight: 700; letter-spacing: 0.1em; margin: 1rem 0; }
        .validity-window { font-size: 1.1rem; color: #4b5563; }
        .qr-placeholder { width: 200px; height: 200px; background: #e5e7eb; display: flex; align-items: center; justify-content: center; margin: 1rem auto; border-radius: 0.5rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { font-weight: 600; background: #f9fafb; }
        .masked { font-family: monospace; color: #6b7280; }
        .error { color: var(--danger); font-size: 0.875rem; margin-top: 0.25rem; }
        .view-toggle { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .view-toggle .btn.active { background: var(--primary); color: white; }
        .view-toggle .btn:not(.active) { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
        .filters { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
    </style>
</head>
<body></body>
</html>
